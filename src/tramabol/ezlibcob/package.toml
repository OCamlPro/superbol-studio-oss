
# name of package
name = "ezlibcob"
skeleton = "library"

# version if different from project version
# version = "0.1.0"

# synopsis if different from project synopsis
# synopsis = ...

# description if different from project description
# description = ...

# kind is either "library", "program" or "virtual"
kind = "program"

# authors if different from project authors
# authors = [ "Me <me@metoo.org>" ]

# name of a file to generate with the current version
gen-version = "version.ml"

# supported file generators are "ocamllex", "ocamlyacc" and "menhir" 
# default is [ "ocamllex", "ocamlyacc" ] 
# generators = [ "ocamllex", "menhir" ]

# menhir options for the package
#Example:
#version = "2.0"
#parser = { modules = ["parser"]; tokens = "Tokens" }
#tokens = { modules = ["tokens"]}
# menhir = ...

# whether all modules should be packed/wrapped (default is true)
# pack-modules = false

# whether the package can be silently skipped if missing deps (default is false)
# optional = true

# module name used to pack modules (if pack-modules is true)
# pack = "Mylib"

# preprocessing options
#  preprocess = "per-module (((action (run ./toto.sh %{input-file})) mod))" 
# preprocess = "pps ppx_deriving_encoding"

# files to skip while updating at package level
skip = ["main.ml"]

# package library dependencies
#   [dependencies]
#   ez_file = ">=0.1 <1.3"
#   base-unix = { libname = "unix", version = ">=base" } 
[dependencies]
camlp-streams = { version = "5", build = true }
ez_file = { version = "0.3.0", build = true }
pretty = { version = "version", build = true }

# package tools dependencies
[tools]
goblint-cil = ">=2.0.0"

# package fields (depends on package skeleton)
#Examples:
#  dune-stanzas = "(preprocess (pps ppx_deriving_encoding))" 
#  dune-libraries = "bigstring" 
#  dune-trailer = "(install (..))" 
#  opam-trailer = "pin-depends: [..]" 
#  no-opam-test = "yes" 
#  no-opam-doc = "yes" 
#  gen-opam = "some" | "all" 
#  dune-flags = "(:standard (:include linking.sexp))" 
#  dune-stanzas = "(foreign_stubs (language c) (names mapfile_stubs))" 
#  static-clibs = "unix" 
[fields]
dune-flags = ":standard (:include flags)"
dune-stanzas = """
(modules V1)
(enabled_if %{env:HAVE_LIBCOB5=true})              ; <- /!\\ enabled by default
(foreign_stubs
  (language c)
  (names libcob_stubs)
  (flags (:standard (:include cflags) (:include libcob_cflags)))
  (include_dirs (include libcob_incdir)))
(c_library_flags :standard (:include libcob_libs))
"""
dune-trailer = """

(executable
 (name genstubs)
 (libraries pretty ez_file camlp-streams goblint-cil)
 (modules error parser types synthetize generate genstubs))

(rule
 (targets v1.ml libcob_stubs.c)
 (deps stubs.h libcob_stubs_header.c libcob_stubs_trailer.c v1_header.ml v1_trailer.ml)
 (action (run %{exe:genstubs.exe} stubs.h v1.ml libcob_stubs.c)))


(rule
 (target flags)
 (enabled_if (<> %{os_type} Win32))
 (action (with-stdout-to %{target} (echo "(-ccopt -fPIC)"))))

(rule
 (target flags)
 (enabled_if (= %{os_type} Win32))
 (action (with-stdout-to %{target} (echo "()"))))

(rule
 (target cflags)
 (enabled_if (<> %{os_type} Win32))
 (action (with-stdout-to %{target} (echo "(-g -O0 -fPIC)"))))

(rule
 (target cflags)
 (enabled_if (= %{os_type} Win32))
 (action (with-stdout-to %{target} (echo "(-g -O0)"))))


(rule
 (targets libcob_incdir)
 (enabled_if (<> %{os_type} Win32))
 (action (with-stdout-to %{targets}
   (run %{env:GNUCOBOL4_CONFIG=cob-config} --includedir))))

(rule
 (targets libcob_incdir)
 (enabled_if (= %{os_type} Win32))
 (action (with-stdout-to %{targets}
   (pipe-stdout
     (run sh %{env:GNUCOBOL4_CONFIG=cob-config} --includedir)
     (run sed "s/\\\\\\\\/\\\\\\\\\\\\\\\\/g")))))


(rule
 (targets libcob_cflags)
 (enabled_if (<> %{os_type} Win32))
 (action (with-stdout-to %{targets}
  (progn (echo "(")
         (run %{env:GNUCOBOL4_CONFIG=cob-config} --cflags)
         (echo ")")))))

(rule
 (targets libcob_cflags)
 (enabled_if (= %{os_type} Win32))
 (action (with-stdout-to %{targets}
  (progn (echo "(")
         (pipe-stdout
           (run sh %{env:GNUCOBOL4_CONFIG=cob-config} --cflags)
           (run sed "s/\\\\\\\\/\\\\\\\\\\\\\\\\/g"))
         (echo ")")))))


(rule
 (targets libcob_libs)
 (enabled_if (<> %{os_type} Win32))
 (action (with-stdout-to %{targets}
  (progn (echo "(")
         (run %{env:GNUCOBOL4_CONFIG=cob-config} --libs)
         (echo ")")))))

(rule
 (targets libcob_libs)
 (enabled_if (= %{os_type} Win32))
 (action (with-stdout-to %{targets}
  (progn (echo "(")
         (pipe-stdout
           (run sh %{env:GNUCOBOL4_CONFIG=cob-config} --libs)
           (run sed "s/\\\\\\\\/\\\\\\\\\\\\\\\\/g"))
         (echo ")")))))

"""
